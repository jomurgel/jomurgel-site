name: Deploy

# Builds the static site and rsyncs dist/ to the droplet over SSH.
# Mirrors the jomurgel-learn workflow, updated for this project: Node 22 and
# Astro's dist/ output. Needs four repo secrets:
#   SSH_KEY          - private key authorized on the droplet
#   HOST             - droplet hostname or IP
#   USERNAME         - SSH user
#   TARGET_DIRECTORY - web root the site is served from (e.g. /var/www/jomurgel.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight deploy if a newer push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust the droplet host key
        run: ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        # --delete keeps the web root an exact mirror of dist/ (removes stale
        # files). Trailing slash on dist/ copies its contents, not the folder.
        run: |
          rsync -avz --delete \
            dist/ \
            "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIRECTORY }}"
