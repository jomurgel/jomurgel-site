name: Deploy

# Builds the static site and rsyncs dist/ to the droplet over SSH.
# Mirrors the jomurgel-learn workflow, updated for this project: Node 22 and
# Astro's dist/ output. Needs four repo secrets:
#   SSH_KEY          - private key authorized on the droplet
#   HOST             - droplet hostname or IP
#   USERNAME         - SSH user
#   TARGET_DIRECTORY - web root the site is served from (e.g. /var/www/jomurgel.com)
#   SSH_KNOWN_HOSTS  - the droplet's public host key (run: ssh-keyscan -H <host>)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight deploy if a newer push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Load SSH key
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust the droplet host key
        # Use a pinned known-hosts secret instead of trusting whatever key the host
        # presents at deploy time (which a MITM/DNS-hijack could spoof). Populate the
        # SSH_KNOWN_HOSTS secret once with: ssh-keyscan -H <droplet-host>
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        # --delete keeps the web root an exact mirror of dist/ (removes stale
        # files). Trailing slash on dist/ copies its contents, not the folder.
        run: |
          rsync -avz --delete \
            dist/ \
            "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIRECTORY }}"
