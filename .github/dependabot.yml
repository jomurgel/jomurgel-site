# Keeps dependencies current. Activates automatically once the repo is on GitHub.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm packages (Astro, integrations, build tooling).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Bundle low-risk updates into one PR; majors still come through individually
      # so breaking changes get reviewed on their own.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the deploy workflow (checkout, setup-node, ssh-agent).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
